# =============================================================================
# docker-compose.yml — Orchestrate services of Doc-Explorer OSS
# =============================================================================
services:
  ollama:
    image: ollama/ollama:latest

    container_name: doc-explorer-ollama

    # “tail -f /dev/null” keeps the container alive after the pull
    entrypoint: >
      bash -c "ollama serve &
               sleep 5 &&
               ollama pull llama3.1 &&
               tail -f /dev/null"

    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    
    networks:
      - doc-explorer-net

    dns:
      - 8.8.8.8
      - 8.8.4.4

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s    # waiting for Ollama + the pull of llama3.1

    restart: unless-stopped

  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow

    container_name: doc-explorer-mlflow

    networks:
      - doc-explorer-net

    volumes:
      - mlflow-data:/mlflow

    ports:
      - "5000:5000" 
    
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

    restart: unless-stopped
    
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api

    container_name: doc-explorer-api

    ports:
      - "8000:8000"

    volumes:
      - ./storage:/app/storage
    
    environment:
      - OLLAMA_HOST
      - LOG_FORMAT
      - ENV
      - DEBUG
      - MLFLOW_TRACKING_URI
      - MLFLOW_EXPERIMENT_NAME
      - CHUNK_SIZE
      - CHUNK_OVERLAP
      - EMBEDDING_MODEL
      - KG_STORE_PATH
      - FAISS_INDEX_DIR

    env_file:
      - .env
    
    depends_on:
      mlflow:
        condition: service_healthy
      ollama:
          condition: service_healthy
    
    networks:
      - doc-explorer-net

    restart: unless-stopped

  training:
    build:
      context: .
      dockerfile: docker/Dockerfile.training

    container_name: doc-explorer-training

    profiles:
      - training

    volumes:
      - ./storage:/app/storage
      - mlflow-data:/mlflow 
      - huggingface-cache:/root/.cache/huggingface
    
    environment:
      - MLFLOW_TRACKING_URI
      - EXPERIMENT_NAME
      - EMBEDDING_MODEL
      - MODEL_DIR
    
    env_file:
      - .env
    
    depends_on:
      mlflow:
        condition: service_healthy
    
    networks:
      - doc-explorer-net

    restart: unless-stopped
  
volumes:
  ollama-data:    # Ollama models downloaded (llama3.1 ~4GB)
  mlflow-data:
  huggingface-cache:
  
networks:
  doc-explorer-net:
    driver: bridge  # bridge = virtual local network created by Docker.

