# =============================================================================
# docker-compose.yml — Orchestrate services of Doc-Explorer OSS
# =============================================================================
services:

  # INFRASTRUCTURE

  postgres:
    image: postgres:15
    container_name: doc-explorer-postgres
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/create_multiple_databases.sh:/docker-entrypoint-initdb.d/create_multiple_databases.sh
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_DB_AIRFLOW}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - doc-explorer-net
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: doc-explorer-redis
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 5
    networks:
      - doc-explorer-net
    restart: unless-stopped

  # ML SERVICES

  ollama:
    image: ollama/ollama:latest

    container_name: doc-explorer-ollama

    # “tail -f /dev/null” keeps the container alive after the pull
    entrypoint: >
      bash -c "ollama serve &
               sleep 5 &&
               ollama pull llama3.1 &&
               tail -f /dev/null"

    ports:
      - "${OLLAMA_PORT}:11434"
    volumes:
      - ollama-data:/root/.ollama

    networks:
      - doc-explorer-net

    dns:
      - 8.8.8.8
      - 8.8.4.4

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow

    container_name: doc-explorer-mlflow
    ports:
      - "${MLFLOW_PORT}:5000"
    volumes:
      - mlflow-data:/mlflow
    networks:
      - doc-explorer-net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

    restart: unless-stopped

  # API

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api

    container_name: doc-explorer-api

    ports:
      - "${API_PORT}:8000"

    volumes:
      - ./storage:/app/storage
      
    environment:
      - OLLAMA_HOST
      - LOG_FORMAT
      - ENV
      - DEBUG
      - MLFLOW_TRACKING_URI
      - MLFLOW_EXPERIMENT_NAME
      - CHUNK_SIZE
      - CHUNK_OVERLAP
      - EMBEDDING_MODEL
      - KG_STORE_PATH
      - FAISS_INDEX_DIR

    env_file:
      - .env

    depends_on:
      mlflow:
        condition: service_healthy
      ollama:
        condition: service_healthy

    networks:
      - doc-explorer-net
    restart: unless-stopped

  # TRAINING
  training:
    build:
      context: .
      dockerfile: docker/Dockerfile.training

    container_name: doc-explorer-training

    profiles:
      - training

    volumes:
      - ./storage:/app/storage
      - mlflow-data:/mlflow
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - MLFLOW_TRACKING_URI
      - EXPERIMENT_NAME
      - EMBEDDING_MODEL
      - MODEL_DIR
    
    env_file:
      - .env

    depends_on:
      mlflow:
        condition: service_healthy

    networks:
      - doc-explorer-net
    restart: no


volumes:
  ollama-data:    # Ollama models downloaded (llama3.1 ~4GB)
  mlflow-data:
  huggingface-cache:
  postgres-data:

networks:
  doc-explorer-net:
    driver: bridge  # bridge = virtual local network created by Docker.

